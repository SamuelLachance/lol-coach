name: Daily pro tier refresh

on:
  schedule:
    # 06:00 UTC — gol.gg pro stats update overnight
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-pro-tiers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch gol.gg pro tiers
        run: python scripts/fetch_golgg_pro_tiers.py

      - name: Apply to champions.json
        run: python scripts/apply_competitive_tiers.py

      - name: Rebuild champions index
        run: python scripts/build_champions_index.py

      - name: Commit tier updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/competitive_tiers.json public/data/champions.json public/data/champions-index.json
          if git diff --staged --quiet; then
            echo "No tier changes to commit"
          else
            git commit -m "$(cat <<'EOF'
chore: daily gol.gg pro tier refresh

Auto-updated competitive tierMeta from gol.gg pro pick/ban stats.
EOF
)"
            git push
          fi
